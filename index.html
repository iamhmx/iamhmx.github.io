<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数独游戏 - 第九届重庆数学文化节</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 数独游戏</h1>
            <p class="subtitle">第九届重庆数学文化节</p>
        </header>

        <nav class="sudoku-types">
            <button class="type-btn active" data-type="standard6">六宫标准数独</button>
            <!-- <button class="type-btn" data-type="standard9">九宫标准数独</button> -->
            <!-- <button class="type-btn" data-type="irregular7">七宫不规则数独</button> -->
        </nav>

        <div class="game-info">
            <div class="rule-box">
                <h3>📖 游戏规则</h3>
                <p id="ruleDescription">在空格内填入数字1-6，使每行、每列、每宫的数字均不重复。</p>
            </div>
            <div class="timer-box">
                <span class="timer-icon">⏱️</span>
                <span id="timerDisplay">00:00</span>
            </div>
        </div>

        <div class="game-container">
            <div id="sudokuBoard" class="sudoku-board size-6"></div>
            
            <div class="number-pad" id="numberPad">
                <!-- Number buttons will be generated by JavaScript -->
            </div>

            <div class="controls">
                <button id="undoBtn" class="control-btn undo-btn">
                    ↩️ 上一步
                </button>
                <button id="refreshBtn" class="control-btn refresh-btn">
                    🔄 刷新 (新游戏)
                </button>
                <button id="checkBtn" class="control-btn check-btn">
                    ✅ 检查答案
                </button>
                <button id="clearBtn" class="control-btn clear-btn">
                    🧹 清空
                </button>
                <!-- <button id="hintBtn" class="control-btn hint-btn">
                    💡 提示
                </button> -->
                <!-- <button id="highlightToggle" class="control-btn highlight-toggle-btn on">
                    🌈 高亮提示：开
                </button> -->
            </div>
        </div>

        <div id="messageBox" class="message-box hidden">
            <div class="message-content">
                <span id="messageText"></span>
                <button id="closeMessage" class="close-btn">×</button>
            </div>
        </div>
    </div>

    <script src="sudoku.js"></script>
</body>
</html>
